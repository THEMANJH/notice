<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>커스텀 공지사항 알리미</title>
    <link rel="manifest" href="/manifest.json">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; max-width: 500px; margin: 0 auto; background-color: #f9f9f9; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        label { font-size: 14px; font-weight: bold; color: #333; display: block; margin-top: 10px; }
        input { width: 100%; padding: 10px; margin: 8px 0 15px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #btn-history { background-color: #6c757d; } /* 회색 버튼 */
        
        .redirect-notice { display: none; background-color: #e2f0d9; color: #385723; padding: 15px; border-radius: 8px; font-size: 16px; font-weight: bold; text-align: center; margin-bottom: 20px; }
        
        /* 기종별 상시 안내 가이드 */
        .guide-section { background-color: #f1f3f5; padding: 15px; border-radius: 8px; margin-top: 20px; }
        .guide-title { font-size: 15px; font-weight: bold; margin-bottom: 12px; color: #495057; text-align: center; }
        .guide-box { padding: 12px; border-radius: 8px; font-size: 14px; margin-bottom: 10px; line-height: 1.5; }
        .ios-guide { background-color: #e3f2fd; color: #0d47a1; border-left: 4px solid #1976d2; }
        .android-guide { background-color: #e8f5e9; color: #1b5e20; border-left: 4px solid #388e3c; margin-bottom: 0; }

        /* 모달(팝업) 스타일 */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
        .modal-content { background-color: #fff; margin: 15% auto; padding: 20px; border-radius: 12px; width: 85%; max-width: 400px; max-height: 70vh; overflow-y: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); position: relative; }
        .close-btn { position: absolute; right: 20px; top: 15px; color: #aaa; font-size: 24px; font-weight: bold; cursor: pointer; }
        .close-btn:hover { color: #000; }
        .history-item { padding: 15px 0; border-bottom: 1px solid #eee; cursor: pointer; transition: background-color 0.2s; }
        .history-item:hover { background-color: #f8f9fa; }
        .history-item:last-child { border-bottom: none; }
        .history-title { font-weight: bold; font-size: 15px; color: #333; margin-bottom: 6px; }
        .history-meta { font-size: 12px; color: #888; }
    </style>
</head>
<body>

    <!-- 🔄 워프 안내 배너 -->
    <div id="redirect-box" class="redirect-notice">
        🔄 잠시 후 해당 공지사항 상세 페이지로 이동합니다...
    </div>

    <!-- 🎯 메인 등록 카드 -->
    <div class="card">
        <h2>🏫 커스텀 공지 알리미</h2>
        <p>알림을 받고 싶은 웹페이지 주소를 입력하세요.</p>
        
        <label for="nickname">👤 구독자 닉네임 (선택)</label>
        <input type="text" id="nickname" placeholder="예: 내 폰, 홍길동" value="">

        <label for="url-input">🔗 모니터링할 URL:</label>
        <input type="url" id="url-input" placeholder="https://example.com/notice" value="https://political.inha.ac.kr/political/7753/subview.do?enc=Zm5jdDF8QEB8JTJGYmJzJTJGcG9saXRpY2FsJTJGMTk0OCUyRmFydGNsTGlzdC5kbyUzRg%3D%3D">
        
        <button id="btn-alert">이 사이트 알림 받기</button>
        <button id="btn-history">🗂️ 지난 알림 보기</button>
    </div>

    <!-- 📱 기종별 바탕화면 추가 가이드 -->
    <div class="card guide-section">
        <div class="guide-title">💡 앱처럼 바탕화면에 추가하기 (권장)</div>
        <div class="guide-box ios-guide">
            🍎 <b>아이폰 (iOS) 유저 필수</b><br>
            Safari 브라우저 하단의 <b>[공유]</b> 아이콘 ➡️ <b>[홈 화면에 추가]</b> 후, 바탕화면에 생긴 앱으로 켜주세요.
        </div>
        <div class="guide-box android-guide">
            🤖 <b>갤럭시 (Android) 유저</b><br>
            Chrome/삼성인터넷 우측 <b>[메뉴(⋮/☰)]</b> ➡️ <b>[홈 화면에 추가]</b> 또는 <b>[앱 설치]</b>를 누르면 더 쾌적합니다.
        </div>
    </div>

    <!-- 🗂️ 지난 알림 보기 팝업 창 -->
    <div id="history-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h3 style="margin-top: 0;">🗂️ 최근 알림 내역</h3>
            <div id="history-list">
                <!-- 데이터가 채워지는 곳 -->
            </div>
        </div>
    </div>

    <!-- ⚙️ 파이어베이스 및 핵심 로직 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-messaging.js";
        import { getFirestore, doc, setDoc, arrayUnion, getDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
        import { getAnalytics, logEvent } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-analytics.js"; // 🚨 GA4 모듈

        const firebaseConfig = {
            apiKey: "AIzaSyDKUA3JA9HifyIAlIQ10cQhAt1HTdL16fc",
            authDomain: "notice-42db9.firebaseapp.com",
            projectId: "notice-42db9",
            storageBucket: "notice-42db9.firebasestorage.app",
            messagingSenderId: "577597948609",
            appId: "1:577597948609:web:afe3da019b67698a194a40",
            measurementId: "G-7B64BXTQCK"
        };

        const app = initializeApp(firebaseConfig);
        const messaging = getMessaging(app);
        const db = getFirestore(app);
        const analytics = getAnalytics(app); // 🚨 GA4 엔진 시동

        // 🚨 1. 워프(리다이렉트) 및 통계 기록 통합 로직
        const urlParams = new URLSearchParams(window.location.search);
        const redirectTarget = urlParams.get('redirect');
        
        if (redirectTarget) {
            document.getElementById('redirect-box').style.display = 'block';
            
            // 앱을 통한 접속 트래픽 통계 기록!
            logEvent(analytics, 'notice_warp_clicked', {
                target_board: decodeURIComponent(redirectTarget)
            });

            setTimeout(() => {
                window.location.href = decodeURIComponent(redirectTarget);
            }, 800);
        }

        onMessage(messaging, (payload) => {
            const { title, body, click_action } = payload.notification || {};
            if (confirm(`🔔 ${title}\n${body}\n\n이동하시겠습니까?`)) {
                if (click_action) window.location.href = click_action;
            }
        });

        const btnAlert = document.getElementById('btn-alert');
        const urlInput = document.getElementById('url-input');
        const nicknameInput = document.getElementById('nickname');

        // 🚨 2. 알림 받기 등록 이벤트
        btnAlert.addEventListener('click', async () => {
            const targetUrl = urlInput.value.trim();
            const nickname = nicknameInput.value.trim() || "익명 기기";

            if(!targetUrl || targetUrl === "https://") {
                alert("올바른 URL 주소를 입력해 주세요.");
                return;
            }

            // [핵심 방어코드] 카카오톡 등 인앱 브라우저 완벽 차단
            if (!('Notification' in window)) {
                alert("🚫 카카오톡 등 앱 내 브라우저에서는 알림을 받을 수 없습니다.\n\n우측 상단 메뉴(⋮)를 눌러 [다른 브라우저로 열기(크롬, 사파리)]를 선택해 주세요!");
                return; 
            }

            try {
                let permission = Notification.permission;
                if (permission !== 'granted' && permission !== 'denied') {
                    permission = await Notification.requestPermission();
                }

                if (permission === 'granted') {
                    const currentToken = await getToken(messaging, { vapidKey: 'BFjhgF_8-0lz2jPoNYSQKYr1v_pHRB_Ec84iTELVfMKZrnamphabPLvx_V4B1zDgGvsb_2iUWGHyJHewkWyJtVQ' });
                    
                    if (currentToken) {
                        const safeDocId = btoa(encodeURIComponent(targetUrl)).replace(/=/g, ""); 
                        const docRef = doc(db, "urls", safeDocId);
                        
                        const subscriptionData = {
                            nickname: nickname,
                            token: currentToken,
                            registeredAt: new Date().toISOString()
                        };

                        await setDoc(docRef, {
                            url: targetUrl,
                            tokens: arrayUnion(currentToken),
                            subscriptions: arrayUnion(subscriptionData)
                        }, { merge: true });

                        alert(`[${nickname}] 이름으로 알림 등록이 완료되었습니다!`);
                    } else {
                        alert("토큰을 가져오지 못했습니다. 브라우저 설정을 확인해주세요.");
                    }
                } else {
                    alert("알림 권한이 거부되었습니다. 브라우저 설정에서 알림을 허용해주세요.");
                }
            } catch (err) {
                alert('등록 실패: ' + err.message);
            }
        });

        // 🚨 3. 지난 알림 보기 팝업(모달) 로직
        const btnHistory = document.getElementById('btn-history');
        const modal = document.getElementById('history-modal');
        const closeBtn = document.querySelector('.close-btn');
        const historyList = document.getElementById('history-list');

        btnHistory.addEventListener('click', async () => {
            const targetUrl = urlInput.value.trim();
            if(!targetUrl || targetUrl === "https://") return;

            modal.style.display = 'block';
            historyList.innerHTML = '<p style="text-align:center; color:#666;">데이터를 불러오는 중입니다...</p>';

            try {
                const safeDocId = btoa(encodeURIComponent(targetUrl)).replace(/=/g, ""); 
                const docRef = doc(db, "urls", safeDocId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    const history = data.history || [];

                    if (history.length === 0) {
                        historyList.innerHTML = '<p style="text-align:center; color:#666;">아직 수집된 알림 내역이 없습니다.</p>';
                    } else {
                        history.sort((a, b) => b.id - a.id);
                        
                        historyList.innerHTML = history.map(item => {
                            const dateObj = new Date(item.timestamp);
                            const timeStr = `${dateObj.getMonth()+1}월 ${dateObj.getDate()}일 ${dateObj.getHours()}:${String(dateObj.getMinutes()).padStart(2, '0')}`;
                            
                            return `
                            <!-- 화면 깨짐 방지를 위해 window.open 새 창 열기 적용 완료 -->
                            <div class="history-item" onclick="window.open('${item.link}', '_blank')">
                                <div class="history-title">${item.title}</div>
                                <div class="history-meta">NO.${item.id} | 🕒 ${timeStr}</div>
                            </div>
                            `;
                        }).join('');
                    }
                } else {
                    historyList.innerHTML = '<p style="text-align:center; color:#666;">해당 게시판은 아직 등록되지 않았습니다.</p>';
                }
            } catch (err) {
                historyList.innerHTML = '<p style="text-align:center; color:red;">데이터를 불러오는데 실패했습니다.</p>';
            }
        });

        closeBtn.addEventListener('click', () => {
            modal.style.display = 'none';
        });

        window.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.style.display = 'none';
            }
        });
    </script>
</body>
</html>
