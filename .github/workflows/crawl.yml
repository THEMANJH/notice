name: Daily Notice Crawler

# ⏰ 주기 설정 (매일 정해진 시간에 작동)
on:
  schedule:
    # POSIX 크론탭 문법 (UTC 기준이므로 한국 시간 15시 = 06:00)
    # 아래 설정은 매일 오후 3시(15시)에 자동으로 크롤러가 켜집니다.
    - cron: '0 6 * * *'
  workflow_dispatch: # 깃허브 웹에서 수동으로도 실행 가능하게 만듬

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
    # 1. 깃허브 서버로 내 코드 내려받기
    - name: Check out repository
      uses: actions/checkout@v4

    # 2. 파이썬 환경 세팅
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. 필수 라이브러리 설치
    - name: Install dependencies
      run: |
        pip install firebase-admin requests beautifulsoup4

    # 4. Step 1에서 등록한 환경변수를 실제 파일로 임시 복원
    - name: Create Firebase Credential File
      run: |
        echo '${{ secrets.FIREBASE_CREDENTIAL_JSON }}' > firebase_credential.json

    # 5. 파이썬 크롤러 가동!
    - name: Run Crawler
      run: python crawler.py